<script>
// ── CONFIG ──
const EL_API_KEY  = 'sk_eeb3cc6d5bf68d8ed75d7c3ac05fa70ab51071b2b006f345';
const EL_VOICE_ID = 'uV2Bhcm1HwmAqPqkbjfl';
const EL_MODEL    = 'eleven_multilingual_v2';

let currentAudio = null;

async function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  setStatus('🔊 ...');
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${EL_VOICE_ID}`, {
      method: 'POST',
      headers: { 'xi-api-key': EL_API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text, model_id: EL_MODEL,
        voice_settings: { stability:0.6, similarity_boost:0.8, style:0.2 }
      })
    });
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { setStatus(''); URL.revokeObjectURL(url); };
    currentAudio.play();
    setStatus('');
  } catch {
    setStatus('');
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'it-IT'; u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }
  }
}
function setStatus(m) { document.getElementById('audio-status').textContent = m; }

let history=["root"], choices=[], future=[];

function updateNav(){
  document.getElementById("backBtn").style.display = history.length>1 ? "flex" : "none";
  document.getElementById("fwdBtn").style.display  = future.length>0  ? "flex" : "none";
  document.getElementById("breadcrumb").textContent = choices.filter(Boolean).map(c=>c.label).join(" › ");
}

function render(nodeId){
  updateNav();
  const node = TREE[nodeId];
  const screen = document.getElementById("screen");
  if(node.special==="preposizione"){ renderPrep(screen); return; }
  if(node.result||nodeId==="result"){ renderResult(screen); return; }
  const colClass = node.cols===3?"grid-3":"grid-2";
  const cur = choices[history.length-1];
  const btns = node.options.map(opt=>{
    const sl=opt.label.replace(/'/g,"\\'");
    const ss=(opt.sub||"").replace(/'/g,"\\'");
    const si=(opt.img||"").replace(/'/g,"\\'");
    const subH=opt.sub?`<span class="forms">${opt.sub}</span>`:""; const hintH=opt.hint?`<span class="hint">${opt.hint}</span>`:"";
    const sel=cur&&cur.label===opt.label?" selected-choice":"";
    return `<button class="btn ${opt.cls}${sel}" onclick="choose('${opt.next}','${sl}','${opt.chipClass}','${si}','${ss}');speak('${sl}')">
      <span class="icon">${opt.icon}</span><span>${opt.label}</span>${hintH}${subH}
    </button>`;
  }).join("");
  screen.innerHTML=`<div class="section-title">${node.title}</div><div class="grid ${colClass}">${btns}</div>`;
}

function renderPrep(screen){
  speak("Preposizione");
  screen.innerHTML=`
    <div class="prep-box">
      <span class="prep-title">🔗 LE PREPOSIZIONI</span>
      <div class="prep-grid">
        <div class="prep-item">
          <span class="prep-type">SEMPLICI</span>
          <span class="prep-words">DI · A · DA<br>IN · CON · SU<br>PER · TRA · FRA</span>
        </div>
        <div class="prep-item">
          <span class="prep-type">ARTICOLATE</span>
          <span class="prep-words" style="font-size:16px !important;">
            DEL · DELLO · DELLA · DELL'<br>
            DEI · DEGLI · DELLE<br>
            AL · ALLO · ALLA · ALL'<br>
            AI · AGLI · ALLE<br>
            DAL · DALLO · DALLA · DALL'<br>
            DAI · DAGLI · DALLE<br>
            NEL · NELLO · NELLA · NELL'<br>
            NEI · NEGLI · NELLE<br>
            SUL · SULLO · SULLA · SULL'<br>
            SUI · SUGLI · SULLE
          </span>
        </div>
      </div>
    </div>
    <button class="restart-btn" onclick="restart()">↺ RICOMINCIA DA CAPO</button>`;
}

async function renderResult(screen){
  const word = document.getElementById("wordInput").value.trim();
  const wordUP = word.toUpperCase();

  const wordBanner = word ? `
    <div class="result-word-banner">
      <span class="rw-label">LA PAROLA CHE HAI ANALIZZATO</span>
      <span class="rw-word">${wordUP}</span>
    </div>` : "";

  const chips = choices.filter(Boolean).map(c=>{
    const imgH=c.img?`<span class="chip-img">${c.img}</span>`:"";
    const subH=c.sub?`<div class="chip-sub">${c.sub}</div>`:"";
    return `<div class="choice-chip ${c.chipClass}">${imgH}<div><div class="chip-val">${c.label}</div>${subH}</div></div>`;
  }).join("");

  // Mostra schermata con scelte + loading verifica
  screen.innerHTML=`
    <div class="result-wrap">
      ${wordBanner}
      <div class="result-header">
        <span class="r-icon">🎉</span>
        <span class="r-label">ANALISI COMPLETATA!</span>
      </div>
      <div class="choices-list" id="chips-list">${chips}</div>
      ${word ? `<div class="loading-box" id="loading-box">
        <span class="l-icon">⏳</span>
        <span class="l-text">CONTROLLO IN CORSO...</span>
      </div>` : ""}
      <button class="restart-btn" onclick="restart()">↺ RICOMINCIA DA CAPO</button>
    </div>`;

  const scelte = choices.filter(Boolean).map(c=>c.label).join(", ");
  speak("Analisi completata. " + (word ? wordUP + ". " : "") + scelte);

  // Se c'è una parola, chiedi a Claude di verificare
  if(word) {
    await verificaConClaude(word, choices.filter(Boolean));
  }
}

async function verificaConClaude(word, scelte) {
  const scelteTesto = scelte.map((c,i)=>`${i+1}. ${c.label}`).join("\n");

  const prompt = `Sei un insegnante di italiano di scuola primaria (classe 4ª).
La parola da analizzare è: "${word}"
Le scelte dello studente sono:
${scelteTesto}

Analizza grammaticalmente la parola "${word}" al livello della classe 4ª primaria italiana.
Considera tutte le interpretazioni valide (es. se una parola può essere nome o aggettivo, entrambe sono accettabili).
Confronta le scelte dello studente con la tua analisi.

Rispondi SOLO con un oggetto JSON, senza testo aggiuntivo, in questo formato:
{
  "analisi_corretta": [
    {"categoria": "NOME/VERBO/ARTICOLO/AGGETTIVO/PREPOSIZIONE", "descrizione": "es. NOME COMUNE, MASCHILE, SINGOLARE, CONCRETO, PRIMITIVO"}
  ],
  "valutazione": [
    {"scelta": "testo della scelta", "corretto": true/false, "nota": "breve nota se sbagliata, es: è FEMMINILE non MASCHILE"}
  ],
  "punteggio": numero da 0 a 100,
  "messaggio": "messaggio di incoraggiamento breve per lo studente (max 10 parole)"
}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const testo = data.content?.[0]?.text || "";
    const clean = testo.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean);
    mostraVerifica(parsed, scelte);
  } catch(e) {
    document.getElementById("loading-box").innerHTML=`<span class="l-text">⚠️ VERIFICA NON DISPONIBILE</span>`;
  }
}

function mostraVerifica(parsed, scelte) {
  const loadingBox = document.getElementById("loading-box");
  if(!loadingBox) return;

  // Aggiorna i chip con ✅ o ❌
  const chipsList = document.getElementById("chips-list");
  if(chipsList && parsed.valutazione) {
    const chips2 = scelte.map((c,i)=>{
      const v = parsed.valutazione[i];
      const ok = v ? v.corretto : true;
      const badge = ok ? "✅" : "❌";
      const nota = (!ok && v && v.nota) ? `<div style="font-size:15px;color:#c0392b !important;margin-top:4px;">${v.nota.toUpperCase()}</div>` : "";
      const chipCls = ok ? c.chipClass : "chip-wrong";
      const imgH = c.img ? `<span class="chip-img">${c.img}</span>` : "";
      const subH = c.sub ? `<div class="chip-sub">${c.sub}</div>` : "";
      return `<div class="choice-chip ${chipCls}">
        ${imgH}
        <div style="flex:1"><div class="chip-val">${c.label}</div>${subH}${nota}</div>
        <span class="chip-badge">${badge}</span>
      </div>`;
    }).join("");
    chipsList.innerHTML = chips2;
  }

  // Punteggio e messaggio
  const punteggio = parsed.punteggio || 0;
  const stelle = punteggio>=90?"⭐⭐⭐":punteggio>=60?"⭐⭐":"⭐";
  const colore = punteggio>=90?"#3B6D11":punteggio>=60?"#BA7517":"#c0392b";

  // Analisi corretta
  const analisiRows = (parsed.analisi_corretta||[]).map(a=>
    `<div class="corretta-row">
      <span class="cr-label">${a.categoria||""}</span>
      <span class="cr-val">${a.descrizione||""}</span>
    </div>`).join("");

  const msg = parsed.messaggio || "Ottimo lavoro!";

  loadingBox.className = "corretta-box";
  loadingBox.innerHTML = `
    <span class="c-title">📖 ANALISI CORRETTA</span>
    ${analisiRows}
    <div style="margin-top:16px;text-align:center;background:#f0f8ff !important;border-radius:12px;padding:14px;border:3px solid #45aaf2;">
      <div style="font-size:36px;margin-bottom:6px;">${stelle}</div>
      <div style="font-size:26px;font-weight:bold;color:${colore} !important;">${punteggio}%</div>
      <div style="font-size:20px;margin-top:6px;font-weight:bold;color:#111 !important;">${msg.toUpperCase()}</div>
    </div>`;

  // Leggi il feedback
  const tutteOk = (parsed.punteggio||0) >= 90;
  speak(tutteOk
    ? "Bravissima! Tutto corretto! " + stelle
    : "Quasi! " + msg);
}

function choose(nextId, label, chipClass, img, sub){
  future=[];
  choices[history.length-1]={label,chipClass,img,sub,nextId};
  history.push(nextId);
  choices[history.length-1]=undefined;
  render(nextId);
}
function goBack(){
  if(history.length<=1) return;
  future.push({nodeId:history[history.length-1],choice:choices[history.length-1]});
  history.pop();
  render(history[history.length-1]);
}
function goForward(){
  if(!future.length) return;
  const n=future.pop();
  history.push(n.nodeId);
  if(n.choice) choices[history.length-1]=n.choice;
  render(n.nodeId);
}
function restart(){
  history=["root"]; choices=[]; future=[];
  document.getElementById("wordInput").value="";
  render("root");
}

render("root");
</script>
</body>
</html>
